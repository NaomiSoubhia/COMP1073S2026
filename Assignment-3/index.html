<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <!-- Build a simple HTML form that you think would be appropriate for a customer to order a pizza. Dynamically add your student id and name somewhere on the page using a p tag and JavaScript.
Be creative – what different options might you want your customers to have?
Validate the HTML pizza order form. The following steps should only execute if all validations pass.
Write JavaScript to capture the values from each of the form inputs when the user clicks the 'order' button.
Create a class called Pizza using the parameters from the order form. The class must include at least one method that builds and returns a description of the pizza order as a string.
When the form is submitted and validated, instantiate a new Pizza object from your class using the captured form values. Visually output the pizza description to the HTML page by invoking the method on your Pizza object — the displayed text must come from that method, not directly from the form values.
The JavaScript and CSS file should be linked to the html. Don't forget to use defer if you are adding script in the head section.
Once you've completed the functionality of the interface, add some CSS to make the page visually attractive (don't spend too much time on this – the focus is the JS).
Ensure that all your HTML, CSS, and JS is well-commented, formatted, and organized.
Upload your application to a live website. (GitHub Pages or any other that works for you.)
Post the URL to the assignment on Blackboard. -->

    <h1>Naomi's Pizza</h1>

    <p id="naomiInfos"></p>
    <div id="orderResult"></div>

    <form id="pizzaForm">

        <fieldset class="customerInfos" >
            <legend>Customer Information</legend>

            <label>
                Full Name
                <input type="text" name="name" id="customerName" required>
            </label>

            <label>
                Phone Number
                <input type="tel" name="phone" id="phone" required>
            </label>

            <label>
                Delivery Address
                <textarea rows="3" id="customerAddress" required></textarea>
            </label>
        </fieldset>

        <fieldset class="pizzaDetails">
            <legend>Pizza Details</legend>

            <label>
                Size
                <select  id="size">
                    <option  value="Small">Small</option>
                    <option  value="Medium">Medium</option>
                    <option value="Large">Large</option>
                </select>
            </label>

            <label>
                Crust
                <select id="crust">
                    <option value="Thin">Thin</option>
                    <option value="Regular">Regular</option>
                    <option value="Stuffed">Stuffed</option>
                </select>
            </label>
        </fieldset>


        <fieldset>
            <legend>Toppings (Choose 2 to 5)</legend>

            <label><input type="checkbox" name="toppings" value="Pepperoni"> Pepperoni</label><br>
            <label><input type="checkbox" name="toppings" value="Bacon"> Bacon</label><br>
            <label><input type="checkbox" name="toppings" value="Chicken"> Chicken</label><br>
            <label><input type="checkbox" name="toppings" value="Mushrooms"> Mushrooms</label><br>
            <label><input type="checkbox" name="toppings" value="Green Peppers"> Green Peppers</label><br>
            <label><input type="checkbox" name="toppings" value="Onions"> Onions</label><br>
            <label><input type="checkbox" name="toppings" value="Black Olives"> Black Olives</label><br>
            <label><input type="checkbox" name="toppings" value="Corns"> Corns</label>
        </fieldset>


        <fieldset>
            <legend>Extras</legend>

            <label><input type="checkbox"  name="extras" value="Garlic Bread"> Garlic Bread</label><br>
            <label><input type="checkbox" name="extras" value="Chicken Wings"> Chicken Wings</label><br>
            <label><input type="checkbox" id="softDrink" name="extras" value="Soft Drink"> Soft Drink </label>
        </fieldset>

        <!-- Choose the soft drink  -->

        <div id="drinkOptions" style="display: none;">
            <fieldset>
                <label>
                    Choose your drink:
                    <select id="drink">
                        <option value="Coke">Coke</option>
                        <option value="Pepsi">Pepsi</option>
                        <option value="Sprite">Sprite</option>
                        <option value="Water">Water</option>
                    </select>
                </label>
            </fieldset>
        </div>


        <fieldset>
            <legend>Delivery Method</legend>

            <label><input type="radio" name="delivery" checked> Delivery</label><br>
            <label><input type="radio" name="delivery"> Pickup</label>
        </fieldset>



        <fieldset>
            <legend>Special Instructions</legend>

            <textarea rows="4" placeholder="Any special requests?"></textarea>
        </fieldset>

        <button type="submit">Place Order</button>

    </form>

    </div>

</body>

</html>

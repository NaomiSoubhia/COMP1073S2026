<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Nana's library</title>
</head>
<body>

        <h1>Nana's Library</h1>
    
<main>

        <section class="search-area">

            <input 
            type="text" 
            id="bookSearch"
            placeholder="Search for a book..."
            >

            <button id="searchBtn">
                Search
            </button>

        </section>


        <section>

            <h2>Book Results</h2>

            <div id="bookContainer"></div>

        </section>


    </main>


    <footer>
        <!-- My infos -->
        <p id="naomiInfo"></p>

        <!-- Link to the Documentation - Google Books API -->
        <p> API Documentation: 
            <a href="https://developers.google.com/books/docs/v1/using"
            target="_blank"> <!-- _blank open in a new tab the link-->
            Google Books API Documentation
            </a>
        </p>
        </footer>

</body>
<script src="js/script.js"></script>
</html>
